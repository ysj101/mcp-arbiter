name: Harness (Policy Engine eval)

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: harness-${{ github.ref }}
  cancel-in-progress: true

jobs:
  harness:
    name: eval (MockLLM)
    runs-on: ubuntu-latest
    env:
      ACCURACY_THRESHOLD: '0.7'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -r build

      - name: Run harness
        run: |
          mkdir -p harness
          pnpm --filter @arbiter/harness run -- \
            --markdown harness/report.md \
            --json harness/report.json \
            --accuracy-threshold "$ACCURACY_THRESHOLD"

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: harness-report
          path: |
            harness/report.md
            harness/report.json

      - name: Comment on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@d746ffe35508b1917358783b479e04febd2b8f71 # v9.0.0
        with:
          script: |
            const fs = require('node:fs');
            const body = fs.readFileSync('harness/report.md', 'utf8');
            const marker = '<!-- arbiter-harness-report -->';
            const existing = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const prev = existing.data.find((c) => c.body?.includes(marker));
            const payload = `${marker}\n${body}`;
            if (prev) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: prev.id,
                body: payload,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: payload,
              });
            }
