services:
  cosmos-emulator:
    image: mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator:vnext-preview
    container_name: arbiter-cosmos
    tty: true
    restart: unless-stopped
    ports:
      - '8081:8081'
      - '10250-10255:10250-10255'
    environment:
      AZURE_COSMOS_EMULATOR_PARTITION_COUNT: '3'
      AZURE_COSMOS_EMULATOR_ENABLE_DATA_PERSISTENCE: 'true'
      AZURE_COSMOS_EMULATOR_IP_ADDRESS_OVERRIDE: 127.0.0.1
    volumes:
      - cosmos-data:/tmp/cosmos/appdata
    # vnext-preview は HTTP で動作する（旧 Linux emulator のような自己署名 HTTPS ではない）。
    # また /_explorer/emulator.pem は vnext では提供されないため、ルートに対して 200 を確認する。
    healthcheck:
      test: ['CMD', 'curl', '-sf', 'http://localhost:8081/']
      interval: 10s
      timeout: 10s
      retries: 30

  signalr-emulator:
    image: mcr.microsoft.com/signalr/signalr-emulator:latest
    # signalr-emulator は linux/amd64 のみ公開。Apple Silicon では Rosetta / QEMU 越しに動かす。
    platform: linux/amd64
    container_name: arbiter-signalr
    restart: unless-stopped
    ports:
      - '8888:8888'
      - '7071:7071'
    # entrypoint が既に `asrs-emulator start -i 0.0.0.0` を渡しているので、
    # command には追加の引数（ポート指定）のみ書く。`start` を重ねるとエラーになる。
    command: ['-p', '8888']

volumes:
  cosmos-data:
